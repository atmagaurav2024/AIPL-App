<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AIPL — Construction Management</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CORE STYLES & SHARED UI
═══════════════════════════════════════════ */
:root{
  --navy:#0D2137;--navy2:#122840;--navy3:#1A3A5C;--blue:#1565C0;--blue2:#1976D2;
  --green:#2E7D32;--greenl:#E8F5E9;--amber:#F57F17;--amberl:#FFF8E1;
  --red:#C62828;--redl:#FFEBEE;--teal:#00838F;--purple:#6A1B9A;
  --bg:#F0F4F8;--white:#fff;--border:#E2E8F0;
  --text:#0D2137;--text2:#475569;--text3:#94A3B8;
  --shadow:0 2px 12px rgba(13,33,55,.08);--shadow2:0 8px 32px rgba(13,33,55,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:Nunito,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* Screen Management */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow-y:auto;z-index:10;}
.screen.on{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Bottom Nav */
.app-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid #E2E8F0;display:none;z-index:500;}
.app-nav.on{display:flex;}
.an-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;}
.an-ic{font-size:22px;}
.an-lb{font-size:10px;font-weight:700;color:#94A3B8;}
.an-item.on .an-lb{color:var(--blue);}

/* ═══════════════════════════════════════════
   SPLASH & AUTH SCREENS
═══════════════════════════════════════════ */
#scr-splash{background:linear-gradient(160deg,var(--navy) 0%,var(--navy3) 60%,#1565C0 100%);align-items:center;justify-content:center;}
.splash-logo{width:80px;height:80px;border-radius:24px;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:36px;}

#scr-login{background:linear-gradient(160deg,var(--navy) 0%,var(--navy3) 50%,#1565C0 100%);}
.login-card{flex:1;background:var(--white);border-radius:28px 28px 0 0;padding:24px;overflow-y:auto;}

/* ═══════════════════════════════════════════
   DASHBOARD & MODULES
═══════════════════════════════════════════ */
.dash-top{background:linear-gradient(135deg,var(--navy),var(--navy3));padding:48px 16px 20px;}
.mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;}
.mod-item{background:white;border-radius:14px;border:1px solid var(--border);padding:12px;text-align:center;box-shadow:var(--shadow);}

/* ═══════════════════════════════════════════
   ACCOUNT MODULE (YOUR CUSTOMIZED SECTION)
═══════════════════════════════════════════ */
.sub-nav{display:flex;gap:8px;padding:10px 14px;background:white;border-bottom:1px solid var(--border);}
.sn-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:700;cursor:pointer;}
.sn-btn.on{background:var(--navy);color:white;border-color:var(--navy);}

.card{background:white;border-radius:16px;border:1px solid var(--border);padding:16px;margin:12px;box-shadow:var(--shadow);}
.finput, .fselect{width:100%;padding:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-size:15px;margin-bottom:12px;outline:none;}
.btn-primary{width:100%;padding:16px;background:var(--navy);color:white;border:none;border-radius:14px;font-weight:800;cursor:pointer;}

.master-table{width:100%;border-collapse:collapse;}
.master-table th{text-align:left;font-size:10px;color:var(--text3);padding:8px;border-bottom:2px solid var(--bg);}
.master-table td{padding:12px 8px;font-size:13px;border-bottom:1px solid var(--bg);}
.code-badge{font-family:'JetBrains Mono';background:var(--bg);color:var(--blue);padding:2px 6px;border-radius:4px;font-weight:700;}

/* ═══════════════════════════════════════════
   ATTENDANCE SYSTEM
═══════════════════════════════════════════ */
.punch-hero{background:linear-gradient(135deg,var(--navy) 0%,#1A3A5C 100%);padding:32px 28px;text-align:center;}
.punch-ring{width:140px;height:140px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;background:var(--green);color:white;font-weight:900;box-shadow:0 8px 32px rgba(46,125,50,0.4);}
</style>
</head>
<body>

<div id="scr-splash" class="screen on">
    <div class="splash-logo">🏗️</div>
    <div style="color:white; font-weight:900; font-size:24px; margin-top:20px;">AIPL INFRA</div>
</div>

<div id="scr-login" class="screen">
    <div style="height:35vh; display:flex; align-items:center; justify-content:center; color:white; font-weight:900; font-size:32px;">LOGIN</div>
    <div class="login-card">
        <input type="text" class="finput" placeholder="Username/Phone">
        <input type="password" class="finput" placeholder="Password">
        <button class="btn-primary" onclick="showApp('dash')">SIGN IN</button>
    </div>
</div>

<div id="scr-dash" class="screen">
    <div class="dash-top">
        <div style="color:white; font-weight:900; font-size:22px;">AIPL Dashboard</div>
    </div>
    <div class="mod-grid">
        <div class="mod-item" onclick="showApp('att')">📍<br>Attendance</div>
        <div class="mod-item" onclick="showApp('acc')">💰<br>Accounts</div>
        <div class="mod-item">🏗️<br>Projects</div>
    </div>
</div>

<div id="scr-att" class="screen">
    <div class="punch-hero">
        <div class="punch-ring">PUNCH IN</div>
        <p style="color:rgba(255,255,255,0.6); margin-top:20px;">NH-44 Highway Site</p>
    </div>
</div>

<div id="scr-acc" class="screen">
    <div class="sub-nav">
        <button id="tab-vouch" class="sn-btn on" onclick="setAccTab('vouch')">Voucher</button>
        <button id="tab-master" class="sn-btn" onclick="setAccTab('master')">Manage Codes</button>
    </div>

    <div id="view-vouch" style="display:block; padding-bottom:80px;">
        <div class="card">
            <div style="font-size:11px; font-weight:800; color:var(--text3); margin-bottom:8px;">SELECT ACCOUNT HEAD</div>
            <select id="v-dropdown" class="fselect">
                <option value="">-- Loading Codes --</option>
            </select>
            <input type="number" class="finput" placeholder="Amount (₹)">
            <input type="text" class="finput" placeholder="Narration">
            <button class="btn-primary" onclick="alert('Voucher Saved!')">SUBMIT</button>
        </div>
    </div>

    <div id="view-master" style="display:none; padding-bottom:80px;">
        <div class="card">
            <div style="font-size:11px; font-weight:800; color:var(--text3); margin-bottom:8px;">ADD NEW CODE MANUALLY</div>
            <input type="text" id="m-code" class="finput" placeholder="Code (e.g. DSL-001)">
            <input type="text" id="m-name" class="finput" placeholder="Name (e.g. Site Diesel)">
            <button class="btn-primary" onclick="saveNewHead()">+ ADD CODE</button>
        </div>
        <div class="card">
            <table class="master-table">
                <thead><tr><th>CODE</th><th>NAME</th></tr></thead>
                <tbody id="master-rows"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="app-nav" id="main-nav">
    <div class="an-item" onclick="showApp('dash')">🏠<div class="an-lb">Home</div></div>
    <div class="an-item" onclick="showApp('att')">📍<div class="an-lb">Att.</div></div>
    <div class="an-item" onclick="showApp('acc')">💰<div class="an-lb">Acc.</div></div>
</div>

<script>
/* ═══════════════════════════════════════════
   APP LOGIC
═══════════════════════════════════════════ */

// Manual Code Storage
let heads = [
    {code:'SITE-01', name:'General Site Expense'},
    {code:'LABR-22', name:'Masonry Labor'}
];

// Navigation Logic
function showApp(scrId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
    document.getElementById('scr-' + scrId).classList.add('on');
    document.getElementById('main-nav').classList.add('on');
    if(scrId === 'acc') refreshUI();
}

// Account Tab Management
function setAccTab(tab) {
    document.getElementById('view-vouch').style.display = tab === 'vouch' ? 'block' : 'none';
    document.getElementById('view-master').style.display = tab === 'master' ? 'block' : 'none';
    document.getElementById('tab-vouch').classList.toggle('on', tab === 'vouch');
    document.getElementById('tab-master').classList.toggle('on', tab === 'master');
    refreshUI();
}

// Add New Code Logic
function saveNewHead() {
    const code = document.getElementById('m-code').value.toUpperCase();
    const name = document.getElementById('m-name').value;
    if(code && name) {
        heads.push({code, name});
        document.getElementById('m-code').value = '';
        document.getElementById('m-name').value = '';
        refreshUI();
        alert("Account Code Added!");
    }
}

// Refresh Dropdowns and Tables
function refreshUI() {
    // Refresh Voucher Dropdown
    const dropdown = document.getElementById('v-dropdown');
    dropdown.innerHTML = '<option value="">-- Select Code --</option>';
    heads.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h.code;
        opt.innerText = `[${h.code}] ${h.name}`;
        dropdown.appendChild(opt);
    });

    // Refresh Master Table
    document.getElementById('master-rows').innerHTML = heads.map(h => `
        <tr><td><span class="code-badge">${h.code}</span></td><td>${h.name}</td></tr>
    `).join('');
}

// Auto-Splash Transition
setTimeout(() => {
    document.getElementById('scr-splash').classList.remove('on');
    document.getElementById('scr-login').classList.add('on');
}, 1500);

</script>
</body>
</html>
