          let prefersDark = window.matchMedia(

          theme = prefersDark ? "dark" : "light";
        }
        document.documentElement.classList.add(theme);

  (function () {
    function initHerculesBadge() {
      const badge = document.getElementById("b8eb5a5a");
      if (!badge) return;

      // Get referral information
      const hostname = window.location.hostname || "unknown";
      const fullUrl = encodeURIComponent(window.location.href);

      // Build tracking URL with UTM parameters
      const baseUrl = "https://hercules.app";
      const params = new URLSearchParams({
        utm_source: hostname,
        utm_medium: "watermark_banner",
        utm_campaign: "built_with_hercules",
        referrer: fullUrl,
      });

      // Update the CTA href with tracking parameters
      const cta = document.getElementById("b8eb5a5a-cta");
      if (cta) {
        cta.href = baseUrl + "?" + params.toString();
      }
    }

    // Initialize when DOM is ready
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initHerculesBadge);
    } else {
      initHerculesBadge();
    }
  })();
</script>
